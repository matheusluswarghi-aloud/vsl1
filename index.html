<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inglês sem Trava — Assista Agora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-start: #c9922a;
      --gold-end:   #f0c870;
      --bg:      #0a0a0a;
      --border:  #1e1e1e;
      --text:    #f5f5f5;
      --muted:   #666;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── URGENCY BAR ── */
    .urgency-bar {
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .urgency-bar p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 5.5vw, 1.9rem);
      letter-spacing: 0.12em;
      color: #fff;
    }

    .urgency-bar p span.highlight {
      color: var(--gold-end);
    }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }

    /* ── VIDEO WRAPPER (vertical 9:16) ── */
    .video-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Vturb container — sem overflow:hidden para não cortar o CTA */
    #vturb-player {
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 6px;
    }

    /* ── FOOTER ── */
    footer {
      background: #000;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-logo img {
      width: min(120px, 30vw);
      height: auto;
      opacity: 0.9;
    }

    .footer-right {
      text-align: right;
      font-size: 0.72rem;
      line-height: 1.85;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .footer-right a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover { color: #c9922a; }

    .footer-links {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
    }

    .footer-divider { color: #333; margin: 0 4px; }
    .footer-dev { margin-top: 2px; font-size: 0.65rem; color: #444; }

    @media (max-width: 600px) {
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .footer-right { text-align: left; }
      .footer-links { justify-content: flex-start; }
    }
  </style>
</head>

  <script>
    /* ── Data dinâmica ── */
    function setDate() {
      var el = document.getElementById('today-date');
      if (!el) return;
      var now   = new Date();
      var day   = String(now.getDate()).padStart(2, '0');
      var month = String(now.getMonth() + 1).padStart(2, '0');
      var year  = now.getFullYear();
      el.textContent = day + '/' + month + '/' + year;
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setDate);
    } else {
      setDate();
    }

    /*
     * ── Integração Vturb ──
     * O botão de compra nativo aparece automaticamente
     * no momento configurado dentro do vídeo.
     */

    /* ── UTM Tracker para botão Vturb (Hotmart sck) ── */
    (function () {
      var UTM_KEYS = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'campaign_id'];
      var params = new URLSearchParams(window.location.search);

      /* Monta o valor do sck com as UTMs presentes */
      var parts = [];
      UTM_KEYS.forEach(function (key) {
        var val = params.get(key);
        if (val) parts.push(key + '=' + encodeURIComponent(val));
      });
      if (!parts.length) return; /* Nenhuma UTM na URL, nada a fazer */

      var sckValue = parts.join('%26'); /* separador literal %26 */

      function patchLinks() {
        var anchors = document.querySelectorAll('vturb-anchor-button a[href*="pay.hotmart.com"]');
        anchors.forEach(function (a) {
          var href = a.getAttribute('href');
          if (!href || href.indexOf('sck=') !== -1) return; /* já possui sck */
          var separator = href.indexOf('?') !== -1 ? '&' : '?';
          a.setAttribute('href', href + separator + 'sck=' + sckValue);
        });
        /* Atualiza também o href do próprio <vturb-anchor-button> */
        var buttons = document.querySelectorAll('vturb-anchor-button[href*="pay.hotmart.com"]');
        buttons.forEach(function (btn) {
          var href = btn.getAttribute('href');
          if (!href || href.indexOf('sck=') !== -1) return;
          var separator = href.indexOf('?') !== -1 ? '&' : '?';
          btn.setAttribute('href', href + separator + 'sck=' + sckValue);
        });
        return anchors.length > 0;
      }

      /* Tenta imediatamente */
      if (patchLinks()) return;

      /* Observa o DOM até o botão da Vturb aparecer (lazy load) */
      var observer = new MutationObserver(function () {
        if (patchLinks()) observer.disconnect();
      });
      observer.observe(document.body || document.documentElement, {
        childList: true,
        subtree: true
      });

      /* Timeout de segurança: para de observar após 60s */
      setTimeout(function () { observer.disconnect(); }, 60000);
    })();
  </script>
